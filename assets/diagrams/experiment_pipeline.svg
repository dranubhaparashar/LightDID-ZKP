<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="500" viewBox="0 0 1180 500">

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#333" />
  </marker>
</defs>
<style>
  .bg { fill: #ffffff; }
  .lane { fill: #f7f9fc; stroke: #d7dde8; stroke-width: 1.2; }
  .box { fill: #ffffff; stroke: #2d3748; stroke-width: 1.3; }
  .holder { fill: #f5fbff; stroke: #245d85; }
  .decision { fill: #fffaf0; stroke: #9a6b16; }
  .backend { fill: #f7fff7; stroke: #276749; }
  .external { fill: #fbf5ff; stroke: #6b46c1; }
  .title { font: 700 14px Arial, sans-serif; fill: #1a202c; }
  .sub { font: 12px Arial, sans-serif; fill: #4a5568; }
  .laneText { font: 700 15px Arial, sans-serif; fill: #2d3748; }
  .arrow { stroke: #333; stroke-width: 1.4; fill: none; }
  .dashed { stroke-dasharray: 6 4; }
  .label { font: 11px Arial, sans-serif; fill: #2d3748; }
</style>

<rect class="bg" width="1180" height="500" />
<text x="590" y="35" text-anchor="middle" style="font:700 23px Arial; fill:#1a202c;">Experiment and Reproducibility Pipeline</text>
<rect x="50" y="100" width="160" height="74" rx="12" class="box holder" /><text x="130.0" y="125" text-anchor="middle" class="title">Summary inputs</text><text x="130.0" y="148" text-anchor="middle" class="sub">BBS and AnonCreds
50-run tables</text>
<rect x="260" y="100" width="160" height="74" rx="12" class="box holder" /><text x="340.0" y="125" text-anchor="middle" class="title">Policy configs</text><text x="340.0" y="148" text-anchor="middle" class="sub">P1–P5 verifier
request classes</text>
<rect x="470" y="100" width="160" height="74" rx="12" class="box holder" /><text x="550.0" y="125" text-anchor="middle" class="title">Device profiles</text><text x="550.0" y="148" text-anchor="middle" class="sub">container / mobile
tight memory</text>
<rect x="680" y="100" width="160" height="74" rx="12" class="box decision" /><text x="760.0" y="125" text-anchor="middle" class="title">CAPS-ZK runner</text><text x="760.0" y="148" text-anchor="middle" class="sub">selection decisions
policy hash</text>
<rect x="890" y="100" width="160" height="74" rx="12" class="box backend" /><text x="970.0" y="125" text-anchor="middle" class="title">Result tables</text><text x="970.0" y="148" text-anchor="middle" class="sub">selector, ablation,
resource grid</text>
<rect x="360" y="300" width="170" height="74" rx="12" class="box backend" /><text x="445.0" y="325" text-anchor="middle" class="title">Figure scripts</text><text x="445.0" y="348" text-anchor="middle" class="sub">latency, VP size,
RSS, decisions</text>
<rect x="650" y="300" width="180" height="74" rx="12" class="box external" /><text x="740.0" y="325" text-anchor="middle" class="title">Reviewer pack</text><text x="740.0" y="348" text-anchor="middle" class="sub">claim boundary,
protocol, upload steps</text>
<line x1="210" y1="137" x2="260" y2="137" class="arrow" marker-end="url(#arrow)" />
<line x1="420" y1="137" x2="470" y2="137" class="arrow" marker-end="url(#arrow)" />
<line x1="630" y1="137" x2="680" y2="137" class="arrow" marker-end="url(#arrow)" />
<line x1="840" y1="137" x2="890" y2="137" class="arrow" marker-end="url(#arrow)" />
<line x1="970" y1="174" x2="445" y2="300" class="arrow" marker-end="url(#arrow)" /><text x="707.5" y="230.0" text-anchor="middle" class="label">CSV inputs</text>
<line x1="445" y1="174" x2="445" y2="300" class="arrow" marker-end="url(#arrow)" />
<line x1="840" y1="337" x2="650" y2="337" class="arrow" marker-end="url(#arrow)" /><text x="745.0" y="330.0" text-anchor="middle" class="label">docs</text>
<text x="590" y="455" text-anchor="middle" style="font:13px Arial; fill:#4a5568;">Run all steps with: python experiments/run_all.py</text>
</svg>