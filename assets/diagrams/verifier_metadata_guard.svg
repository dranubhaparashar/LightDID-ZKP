<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="460" viewBox="0 0 1180 460">

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#333" />
  </marker>
</defs>
<style>
  .bg { fill: #ffffff; }
  .lane { fill: #f7f9fc; stroke: #d7dde8; stroke-width: 1.2; }
  .box { fill: #ffffff; stroke: #2d3748; stroke-width: 1.3; }
  .holder { fill: #f5fbff; stroke: #245d85; }
  .decision { fill: #fffaf0; stroke: #9a6b16; }
  .backend { fill: #f7fff7; stroke: #276749; }
  .external { fill: #fbf5ff; stroke: #6b46c1; }
  .title { font: 700 14px Arial, sans-serif; fill: #1a202c; }
  .sub { font: 12px Arial, sans-serif; fill: #4a5568; }
  .laneText { font: 700 15px Arial, sans-serif; fill: #2d3748; }
  .arrow { stroke: #333; stroke-width: 1.4; fill: none; }
  .dashed { stroke-dasharray: 6 4; }
  .label { font: 11px Arial, sans-serif; fill: #2d3748; }
</style>

<rect class="bg" width="1180" height="460" />
<text x="590" y="35" text-anchor="middle" style="font:700 23px Arial; fill:#1a202c;">Verifier-Side Metadata Guard</text>
<rect x="70" y="110" width="180" height="78" rx="12" class="box backend" /><text x="160.0" y="135" text-anchor="middle" class="title">VP response</text><text x="160.0" y="158" text-anchor="middle" class="sub">proof object +
orchestration metadata</text>
<rect x="330" y="110" width="190" height="78" rx="12" class="box decision" /><text x="425.0" y="135" text-anchor="middle" class="title">Metadata checks</text><text x="425.0" y="158" text-anchor="middle" class="sub">nonce, domain,
policy hash, disclosure set</text>
<rect x="610" y="110" width="190" height="78" rx="12" class="box decision" /><text x="705.0" y="135" text-anchor="middle" class="title">Leakage boundary</text><text x="705.0" y="158" text-anchor="middle" class="sub">no raw credential
no link secret</text>
<rect x="890" y="110" width="190" height="78" rx="12" class="box external" /><text x="985.0" y="135" text-anchor="middle" class="title">Backend verifier</text><text x="985.0" y="158" text-anchor="middle" class="sub">BBS or AnonCreds
cryptographic verification</text>
<rect x="470" y="285" width="240" height="78" rx="12" class="box decision" /><text x="590.0" y="310" text-anchor="middle" class="title">Fail closed</text><text x="590.0" y="333" text-anchor="middle" class="sub">reject mismatched policy,
replay, domain substitution,
or metadata leakage</text>
<line x1="250" y1="149" x2="330" y2="149" class="arrow" marker-end="url(#arrow)" />
<line x1="520" y1="149" x2="610" y2="149" class="arrow" marker-end="url(#arrow)" />
<line x1="800" y1="149" x2="890" y2="149" class="arrow" marker-end="url(#arrow)" /><text x="845.0" y="142.0" text-anchor="middle" class="label">if guard passes</text>
<line x1="425" y1="188" x2="560" y2="285" class="arrow" marker-end="url(#arrow)" /><text x="492.5" y="229.5" text-anchor="middle" class="label">guard fails</text>
<line x1="705" y1="188" x2="600" y2="285" class="arrow" marker-end="url(#arrow)" /><text x="652.5" y="229.5" text-anchor="middle" class="label">leak detected</text>
</svg>