<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300">
<style>
.bg { fill:#0f172a; }
.text1 { font:700 42px Arial,sans-serif; fill:#ffffff; }
.text2 { font:20px Arial,sans-serif; fill:#cbd5e1; }
.card { fill:#111827; stroke:#38bdf8; stroke-width:2; }
.small { font:700 18px Arial,sans-serif; fill:#ffffff; }
.tiny { font:14px Arial,sans-serif; fill:#cbd5e1; }
</style>
<rect class="bg" width="1280" height="300" />
<text x="60" y="85" class="text1">LightDID-ZKP</text>
<text x="60" y="123" class="text2">Policy- and resource-aware selection of BBS and AnonCreds presentations</text>
<text x="60" y="153" class="text2">for privacy-preserving decentralized identity</text>
<rect x="70" y="195" width="230" height="60" rx="12" class="card" /><text x="185" y="224" text-anchor="middle" class="small">BBS</text><text x="185" y="244" text-anchor="middle" class="tiny">selective disclosure</text>
<rect x="335" y="195" width="230" height="60" rx="12" class="card" /><text x="450" y="224" text-anchor="middle" class="small">AnonCreds</text><text x="450" y="244" text-anchor="middle" class="tiny">hidden predicates</text>
<rect x="600" y="195" width="230" height="60" rx="12" class="card" /><text x="715" y="224" text-anchor="middle" class="small">CAPS-ZK</text><text x="715" y="244" text-anchor="middle" class="tiny">safe backend selector</text>
<rect x="865" y="195" width="300" height="60" rx="12" class="card" /><text x="1015" y="224" text-anchor="middle" class="small">Reproducible Experiments</text><text x="1015" y="244" text-anchor="middle" class="tiny">tables, plots, tests, docs</text>
