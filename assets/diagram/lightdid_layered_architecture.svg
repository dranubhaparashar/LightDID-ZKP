<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#333" />
  </marker>
</defs>
<style>
  .bg { fill: #ffffff; }
  .lane { fill: #f7f9fc; stroke: #d7dde8; stroke-width: 1.2; }
  .box { fill: #ffffff; stroke: #2d3748; stroke-width: 1.3; }
  .holder { fill: #f5fbff; stroke: #245d85; }
  .decision { fill: #fffaf0; stroke: #9a6b16; }
  .backend { fill: #f7fff7; stroke: #276749; }
  .external { fill: #fbf5ff; stroke: #6b46c1; }
  .title { font: 700 14px Arial, sans-serif; fill: #1a202c; }
  .sub { font: 12px Arial, sans-serif; fill: #4a5568; }
  .laneText { font: 700 15px Arial, sans-serif; fill: #2d3748; }
  .arrow { stroke: #333; stroke-width: 1.4; fill: none; }
  .dashed { stroke-dasharray: 6 4; }
  .label { font: 11px Arial, sans-serif; fill: #2d3748; }
</style>

<rect class="bg" width="1280" height="760" />
<text x="640" y="34" text-anchor="middle" style="font:700 24px Arial; fill:#1a202c;">LightDID-ZKP Layered Architecture</text>
<text x="640" y="58" text-anchor="middle" style="font:14px Arial; fill:#4a5568;">Policy- and resource-aware selection between BBS selective disclosure and AnonCreds predicate presentations</text>

<rect x="40" y="95" width="1200" height="92" rx="16" class="lane" />
<text x="70" y="124" class="laneText">External DID / VC Participants</text>
<rect x="100" y="130" width="150" height="42" rx="12" class="box external" /><text x="175.0" y="155" text-anchor="middle" class="title">Issuer I</text><text x="175.0" y="178" text-anchor="middle" class="sub">VC issuance</text>
<rect x="565" y="130" width="150" height="42" rx="12" class="box external" /><text x="640.0" y="155" text-anchor="middle" class="title">Registry</text><text x="640.0" y="178" text-anchor="middle" class="sub">DID documents / schemas</text>
<rect x="1030" y="130" width="150" height="42" rx="12" class="box external" /><text x="1105.0" y="155" text-anchor="middle" class="title">Verifier V</text><text x="1105.0" y="178" text-anchor="middle" class="sub">policy request / verification</text>

<rect x="70" y="220" width="1140" height="365" rx="18" fill="#ffffff" stroke="#245d85" stroke-width="2" stroke-dasharray="8 5" />
<text x="105" y="250" class="laneText">Holder-side orchestration boundary</text>
<rect x="100" y="280" width="170" height="70" rx="12" class="box holder" /><text x="185.0" y="305" text-anchor="middle" class="title">Holder wallet layer</text><text x="185.0" y="328" text-anchor="middle" class="sub">request handling
nonce/domain binding</text>
<rect x="325" y="280" width="165" height="70" rx="12" class="box holder" /><text x="407.5" y="305" text-anchor="middle" class="title">Credential store</text><text x="407.5" y="328" text-anchor="middle" class="sub">BBS / AnonCreds
metadata</text>
<rect x="545" y="280" width="165" height="70" rx="12" class="box holder" /><text x="627.5" y="305" text-anchor="middle" class="title">Policy parser</text><text x="627.5" y="328" text-anchor="middle" class="sub">P=(A_R,A_H,Φ,L,R,τ,d,κ,λ)</text>
<rect x="765" y="280" width="165" height="70" rx="12" class="box holder" /><text x="847.5" y="305" text-anchor="middle" class="title">Resource profiler</text><text x="847.5" y="328" text-anchor="middle" class="sub">device budgets
latency/size/RSS</text>
<rect x="980" y="280" width="165" height="70" rx="12" class="box holder" /><text x="1062.5" y="305" text-anchor="middle" class="title">Policy hash</text><text x="1062.5" y="328" text-anchor="middle" class="sub">policy commitment
anti-substitution</text>

<rect x="135" y="420" width="200" height="88" rx="12" class="box decision" /><text x="235.0" y="445" text-anchor="middle" class="title">CAPS-ZK decision layer</text><text x="235.0" y="468" text-anchor="middle" class="sub">semantic filter → privacy filter
predicate filter → resource filter
cost scorer</text>
<rect x="390" y="420" width="140" height="70" rx="12" class="box decision" /><text x="460.0" y="445" text-anchor="middle" class="title">Semantic filter</text><text x="460.0" y="468" text-anchor="middle" class="sub">policy/backend
compatibility</text>
<rect x="555" y="420" width="140" height="70" rx="12" class="box decision" /><text x="625.0" y="445" text-anchor="middle" class="title">Privacy filter</text><text x="625.0" y="468" text-anchor="middle" class="sub">unlinkability
privacy level</text>
<rect x="720" y="420" width="140" height="70" rx="12" class="box decision" /><text x="790.0" y="445" text-anchor="middle" class="title">Predicate filter</text><text x="790.0" y="468" text-anchor="middle" class="sub">credential-backed
hidden predicates</text>
<rect x="885" y="420" width="140" height="70" rx="12" class="box decision" /><text x="955.0" y="445" text-anchor="middle" class="title">Resource filter</text><text x="955.0" y="468" text-anchor="middle" class="sub">latency / size
RSS budgets</text>
<rect x="1050" y="420" width="120" height="70" rx="12" class="box decision" /><text x="1110.0" y="445" text-anchor="middle" class="title">Cost scorer</text><text x="1110.0" y="468" text-anchor="middle" class="sub">select lowest
feasible score</text>

<rect x="190" y="625" width="205" height="64" rx="12" class="box backend" /><text x="292.5" y="650" text-anchor="middle" class="title">Backend adapter layer</text><text x="292.5" y="673" text-anchor="middle" class="sub">uniform VP composition API</text>
<rect x="460" y="625" width="150" height="64" rx="12" class="box backend" /><text x="535.0" y="650" text-anchor="middle" class="title">BBS adapter</text><text x="535.0" y="673" text-anchor="middle" class="sub">selective disclosure</text>
<rect x="660" y="625" width="160" height="64" rx="12" class="box backend" /><text x="740.0" y="650" text-anchor="middle" class="title">AnonCreds adapter</text><text x="740.0" y="673" text-anchor="middle" class="sub">predicate proof path</text>
<rect x="880" y="625" width="160" height="64" rx="12" class="box backend" /><text x="960.0" y="650" text-anchor="middle" class="title">VP composer</text><text x="960.0" y="673" text-anchor="middle" class="sub">metadata + proof
response object</text>

<line x1="250" y1="151" x2="565" y2="151" class="arrow" marker-end="url(#arrow)" /><text x="407.5" y="144.0" text-anchor="middle" class="label">issue / publish metadata</text>
<line x1="715" y1="151" x2="1030" y2="151" class="arrow" marker-end="url(#arrow)" /><text x="872.5" y="144.0" text-anchor="middle" class="label">policy / trust material</text>
<line x1="1030" y1="151" x2="270" y2="315" class="arrow" marker-end="url(#arrow)" /><text x="650.0" y="226.0" text-anchor="middle" class="label">presentation request</text>
