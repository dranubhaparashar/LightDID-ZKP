<line x1="930" y1="315" x2="980" y2="315" class="arrow" marker-end="url(#arrow)" />
<line x1="185" y1="350" x2="200" y2="420" class="arrow" marker-end="url(#arrow)" />
<line x1="635" y1="350" x2="235" y2="420" class="arrow" marker-end="url(#arrow)" />
<line x1="845" y1="350" x2="235" y2="420" class="arrow" marker-end="url(#arrow)" />
<line x1="1060" y1="350" x2="235" y2="420" class="arrow" marker-end="url(#arrow)" />
<line x1="335" y1="464" x2="390" y2="455" class="arrow" marker-end="url(#arrow)" />
<line x1="530" y1="455" x2="555" y2="455" class="arrow" marker-end="url(#arrow)" />
<line x1="695" y1="455" x2="720" y2="455" class="arrow" marker-end="url(#arrow)" />
<line x1="860" y1="455" x2="885" y2="455" class="arrow" marker-end="url(#arrow)" />
<line x1="1025" y1="455" x2="1050" y2="455" class="arrow" marker-end="url(#arrow)" />
<line x1="1110" y1="490" x2="295" y2="625" class="arrow" marker-end="url(#arrow)" /><text x="702.5" y="550.5" text-anchor="middle" class="label">selected backend</text>
<line x1="395" y1="657" x2="460" y2="657" class="arrow" marker-end="url(#arrow)" />
<line x1="395" y1="657" x2="660" y2="657" class="arrow" marker-end="url(#arrow)" />
<line x1="820" y1="657" x2="880" y2="657" class="arrow" marker-end="url(#arrow)" />
<line x1="1040" y1="657" x2="1080" y2="172" class="arrow" marker-end="url(#arrow)" /><text x="1060.0" y="407.5" text-anchor="middle" class="label">VP response</text>
</svg>